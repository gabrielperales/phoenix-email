name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # Create tags and GitHub Releases
  pull-requests: write # Create and update the Release PR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Sampo shells out to `mix hex.publish` for Hex packages
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Install dependencies
        run: mix deps.get

      # `auto` mode: prepares/refreshes the Release PR while changesets
      # exist, publishes to Hex and tags once that PR is merged.
      - uses: bruits/sampo/crates/sampo-github-action@cargo-sampo-github-action-v0.17.0
        with:
          create-github-release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
